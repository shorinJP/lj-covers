<h3>Fale Conosco</h3>

<div class="alert alert-success" *ngIf="mensagem.length > 0">
  <b>{{ mensagem }}</b>
</div>

<br />
Preencha o formulário abaixo para entrar em contato.<br /><br />

Nome: <input type="text" [(ngModel)]="nome" class="form-control" placeholder="Seu nome completo" /><br />
Email: <input type="email" [(ngModel)]="email" class="form-control" placeholder="Seu email" /><br />
Telefone: <input type="text" [(ngModel)]="telefone" class="form-control" placeholder="Seu telefone" /><br />
Assunto:
<select [(ngModel)]="titulo" class="form-control">
  <option>Problemas com produtos</option>
  <option>Problemas com pedidos</option>
  <option>Problemas com cadastro</option>
  <option>Dúvidas e sugestões</option>
</select><br />
Mensagem:
<textarea rows="5" [(ngModel)]="texto" class="form-control"></textarea><br />
<input type="checkbox" [(ngModel)]="copia" /> Deseja receber uma cópia do email<br /><br />
<button (click)="enviar()" class="btn btn-outline-success">Enviar</button>
