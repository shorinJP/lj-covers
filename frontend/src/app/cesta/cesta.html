<app-header (buscar)="fazerBusca($event)"></app-header>
<div class="container mt-5" style="max-width: 900px;">
  <h2 class="mb-4">Cesta</h2>

  <div *ngIf="mensagem" class="alert alert-success">{{ mensagem }}</div>
  <div *ngIf="erro" class="alert alert-danger">{{ erro }}</div>

  <div *ngIf="itens.length === 0 && !mensagem" style="background: #fff; border-radius: 16px; padding: 48px; text-align: center;">
    <p style="font-size: 32px; margin-bottom: 8px;">🛍️</p>
    <p class="text-muted mb-3">Sua cesta está vazia.</p>
    <p class="text-muted mb-4" style="font-size: 13px;">Adicione algo na sua cesta e volte aqui para finalizar sua compra.</p>
    <button class="btn btn-dark" style="border-radius: 24px;" (click)="irParaVitrine()">Explorar vitrine</button>
  </div>

  <div *ngIf="itens.length > 0" style="background: #fff; border-radius: 16px; padding: 24px;">
    <table class="table mb-0">
      <thead>
        <tr>
          <th>Item</th>
          <th>Qtd</th>
          <th class="text-end">Valor</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of itens">
          <td>{{ item.produto.nome }}</td>
          <td>
            <div class="d-flex align-items-center gap-2">
              <button class="btn btn-sm btn-outline-secondary" style="border-radius: 50%; width: 28px; height: 28px; padding: 0;" (click)="diminuir(item)">−</button>
              {{ item.quantidade }}x
              <button class="btn btn-sm btn-outline-secondary" style="border-radius: 50%; width: 28px; height: 28px; padding: 0;" (click)="aumentar(item)">+</button>
            </div>
          </td>
          <td class="text-end">R$ {{ item.valor * item.quantidade | number:'1.2-2' }}</td>
        </tr>
      </tbody>
    </table>

    <hr>
    <div class="d-flex justify-content-between align-items-center">
      <strong>Total</strong>
      <strong>R$ {{ total | number:'1.2-2' }}</strong>
    </div>

    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-outline-danger" style="border-radius: 24px;" (click)="limparCesta()">Limpar cesta</button>
      <button class="btn btn-outline-dark" style="border-radius: 24px" (click)="continuarComprando()">Continuar comprando</button>
      <button class="btn btn-success ms-auto" style="border-radius: 24px;" (click)="finalizar()">Finalizar</button>
    </div>
  </div>
</div>
