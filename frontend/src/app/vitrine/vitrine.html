<app-header (buscar)="fazerBusca($event)"></app-header>
<div class="container mt-4">

  <p *ngIf="busca" class="campo-busca">
    <span>🔍 Pesquisa por: <strong>{{busca}}</strong></span>
    <button class="btn btn-outline-dark btn-sm" (click)="limparBusca()">Limpar</button>
  </p>

  <h1>Vitrine</h1>
  
  <div class="row row-cols-1 row-cols-md-3 row-cols-xxl-4 g-3">
    <div *ngFor="let obj of listaBusca" class="col">
      <div class="card h-100">
        <img [src]="'public/img' + obj.codigo + '.jpeg'" class="card-img-top img-fluid"
          style="height: 200px; object-fit: contain; cursor: pointer; padding: 8px;"
          (click)="irParaDetalhe(obj)">
        <h4 class="mt-2" style="font-size: 15px; font-weight: 700;" (click)="irParaDetalhe(obj)">
          {{obj.nome}}
        </h4>
        <div>R$ {{obj.valor | number:'1.2-2'}}</div>
        <button class="btn btn-outline-success btn-sm mt-2" 
          (click)="irParaCesta(obj)"
          [disabled]="obj.quantidade === 0">
          <i class="bi bi-bag-plus"></i> {{ obj.quantidade === 0 ? 'Esgotado' : 'Comprar' }}
        </button>
      </div>
    </div>
  </div>

  <p *ngIf="listaBusca.length === 0 && busca && busca.trim() !== ''" class="text-center text-muted mt-5" style="font-size: 15px;">
    💿 Nenhum disco encontrado para "<strong>{{busca}}</strong>".
  </p>

</div>
