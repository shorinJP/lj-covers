<app-header (buscar)="fazerBusca($event)"></app-header>

<div class="login-wrapper">
  <div class="login-card">
    <div class="disco-deco">
      <div class="disco-outer">
        <div class="disco-inner"></div>
        <div class="disco-label">♪</div>
      </div>
    </div>

    <div class="login-body">
      <h2 class="login-title">Já tenho cadastro</h2>
      <p class="login-sub">Entre com seu e-mail e senha</p>

      <input type="email" placeholder="Email" [(ngModel)]="email" class="form-control campo" />
      <input type="password" placeholder="Senha" [(ngModel)]="senha" class="form-control campo" />

      <button class="btn btn-dark btn-entrar" (click)="entrar()">Entrar</button>

      <p *ngIf="mensagem" class="mensagem-ok">{{ mensagem }}</p>

      <p class="link-senha" (click)="irParaRecuperarSenha()">
        <i class="bi bi-key"></i> Esqueci minha senha
      </p>
    </div>
  </div>

  <div class="divisor">
    <div class="linha-v"></div>
    <span class="ou">ou</span>
    <div class="linha-v"></div>
  </div>

  <div class="cadastro-card">
    <div class="vinyl-icon">💿</div>
    <h2>Ainda não tenho cadastro</h2>
    <p class="text-muted" style="font-size: 14px;">Crie sua conta e comece a colecionar.</p>
    <button (click)="irParaCadastro()" class="btn btn-outline-dark btn-cadastro">Criar conta</button>
  </div>
</div>
