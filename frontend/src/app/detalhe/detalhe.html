<app-header (buscar)="fazerbusca($event)"></app-header>

<div class="container detalhe-wrapper" *ngIf="detalhe">
  <div class="detalhe-card">

    <div class="col-imagem">
      <div class="disco-frame">
        <img
          [src]="'public/img' + detalhe.codigo + '.jpeg'"
          class="img-fluid album-img"
          style="max-height: 320px; object-fit: contain;">
        <div class="mini-disco" *ngIf="detalhe.faixas?.length">
          <div class="mini-disco-inner"></div>
        </div>
      </div>
    </div>

    <div class="col-info">
      <p class="gravadora-tag" *ngIf="detalhe.gravadora">
        <i class="bi bi-vinyl"></i> {{ detalhe.gravadora }}
      </p>

      <h2 class="album-nome">{{ detalhe.nome }}</h2>
      <p class="album-desc">{{ detalhe.descritivo }}</p>
      <h4 class="album-preco">R$ {{ detalhe.valor | number:'1.2-2' }}</h4>

      <button (click)="irParaCesta()" 
        class="btn btn-outline-success btn-comprar"
        [disabled]="detalhe.quantidade === 0">
        <i class="bi bi-bag-plus"></i> {{ detalhe.quantidade === 0 ? 'Esgotado' : 'Comprar' }}
      </button>

      <div class="faixas-box" *ngIf="detalhe.faixas && detalhe.faixas.length > 0">
        <p class="faixas-titulo">
          <i class="bi bi-music-note-list"></i> Faixas
          <span class="faixas-qtd">{{ detalhe.faixas.length }}</span>
        </p>
        <ol class="faixas-lista">
          <li *ngFor="let faixa of detalhe.faixas">{{ faixa }}</li>
        </ol>
      </div>
    </div>

  </div>
</div>
